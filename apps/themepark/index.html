<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>build 2026-02-10-themepark-v3</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        background: #6a9f43;
      }

      #hud {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 10;
        color: #ffffff;
        text-shadow: 0 2px 3px rgba(0, 0, 0, 0.45);
        user-select: none;
        pointer-events: none;
        max-width: min(92vw, 820px);
      }

      #hud-build {
        font-size: clamp(22px, 3vw, 38px);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: 0.02em;
        margin-bottom: 6px;
      }

      #hud-meta {
        font-size: clamp(13px, 1.5vw, 18px);
        line-height: 1.35;
        font-weight: 600;
      }

      #hud-message {
        min-height: 1.35em;
      }

      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="hud" aria-live="polite">
      <div id="hud-build">build 2026-02-10-themepark-v3</div>
      <div id="hud-meta">
        <div id="hud-tool">tool: road</div>
        <div id="hud-hover">hover: (-, -)</div>
        <div id="hud-road-count">road count: 0</div>
        <div id="hud-attraction-count">attraction count: 0</div>
        <div>R/A/X でツール切替、クリックで配置</div>
        <div id="hud-message"></div>
      </div>
    </div>
    <canvas id="game-canvas" aria-label="草地タイル表示"></canvas>

    <!--
      動作確認手順
      1) 直接開く方法
         - apps/themepark/index.html を Chrome で直接開く。
      2) 直接開いて問題がある場合の簡易サーバ手順
         - このリポジトリのルートで以下を実行:
           py -m http.server 8000
           (または python -m http.server 8000)
         - Chrome で http://localhost:8000/apps/themepark/index.html を開く。
      3) ステップ3確認
         - R/A/X でツール切替ができる。
         - 道ツールで道をトグル配置できる。
         - 施設は道に上下左右で隣接する草地にのみ置ける。
         - 消しゴムで道/施設を消せる（重なり時は施設優先）。
         - リサイズ後も道と施設が残る。
    -->

    <script>
      (() => {
        "use strict";

        const BUILD_LABEL = "build 2026-02-10-themepark-v3";
        const TILE_SIZE = 32;
        const BASE_A = "#78b24f";
        const BASE_B = "#6ea847";
        const SPECK = "rgba(24, 71, 20, 0.32)";
        const ROAD_FILL = "#8b8f95";
        const ROAD_EDGE = "rgba(255, 255, 255, 0.22)";
        const ATTRACTION_FILL = "#d4682f";
        const ATTRACTION_MARK = "#ffe4a8";
        const HOVER_FILL = "rgba(255, 255, 220, 0.23)";
        const HOVER_EDGE = "rgba(255, 255, 255, 0.8)";
        const TOOL_ROAD = "road";
        const TOOL_ATTRACTION = "attraction";
        const TOOL_ERASE = "erase";

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const hudBuild = document.getElementById("hud-build");
        const hudTool = document.getElementById("hud-tool");
        const hudHover = document.getElementById("hud-hover");
        const hudRoadCount = document.getElementById("hud-road-count");
        const hudAttractionCount = document.getElementById("hud-attraction-count");
        const hudMessage = document.getElementById("hud-message");

        const roadTiles = new Set();
        const attractionTiles = new Set();
        let hoverTile = null;
        let currentTool = TOOL_ROAD;
        let hudFlashMessage = "";
        let cssWidth = 0;
        let cssHeight = 0;
        let dpr = 1;

        hudBuild.textContent = BUILD_LABEL;
        document.title = BUILD_LABEL;

        const speckPattern = [
          [4, 6],
          [12, 9],
          [24, 4],
          [7, 18],
          [19, 15],
          [28, 20],
          [10, 26],
          [22, 27]
        ];

        function tileKey(x, y) {
          return `${x},${y}`;
        }

        function parseTileKey(key) {
          const [xText, yText] = key.split(",");
          return {
            x: Number.parseInt(xText, 10),
            y: Number.parseInt(yText, 10)
          };
        }

        function setMessage(text) {
          hudFlashMessage = text;
        }

        function updateHud() {
          hudTool.textContent = `tool: ${currentTool}`;
          if (hoverTile) {
            hudHover.textContent = `hover: (${hoverTile.x}, ${hoverTile.y})`;
          } else {
            hudHover.textContent = "hover: (-, -)";
          }
          hudRoadCount.textContent = `road count: ${roadTiles.size}`;
          hudAttractionCount.textContent = `attraction count: ${attractionTiles.size}`;
          hudMessage.textContent = hudFlashMessage;
        }

        function resizeCanvasAndRender() {
          dpr = Math.max(1, window.devicePixelRatio || 1);
          cssWidth = window.innerWidth;
          cssHeight = window.innerHeight;

          canvas.width = Math.floor(cssWidth * dpr);
          canvas.height = Math.floor(cssHeight * dpr);

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.imageSmoothingEnabled = false;

          render();
        }

        function getPointerTile(event) {
          const rect = canvas.getBoundingClientRect();
          const localX = event.clientX - rect.left;
          const localY = event.clientY - rect.top;

          if (localX < 0 || localY < 0 || localX >= rect.width || localY >= rect.height) {
            return null;
          }

          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const cssX = (localX * scaleX) / dpr;
          const cssY = (localY * scaleY) / dpr;

          return {
            x: Math.floor(cssX / TILE_SIZE),
            y: Math.floor(cssY / TILE_SIZE)
          };
        }

        function drawGrassAndSpecks(cols, rows) {
          for (let y = 0; y < rows; y += 1) {
            for (let x = 0; x < cols; x += 1) {
              const px = x * TILE_SIZE;
              const py = y * TILE_SIZE;

              ctx.fillStyle = (x + y) % 2 === 0 ? BASE_A : BASE_B;
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

              ctx.fillStyle = SPECK;
              for (let i = 0; i < speckPattern.length; i += 1) {
                const point = speckPattern[i];
                const ox = point[0] + ((x * 13 + y * 7 + i * 5) % 3);
                const oy = point[1] + ((x * 5 + y * 11 + i * 3) % 3);
                ctx.fillRect(px + ox, py + oy, 1.4, 1.4);
              }
            }
          }
        }

        function drawRoads(cols, rows) {
          roadTiles.forEach((key) => {
            const tile = parseTileKey(key);
            if (tile.x < 0 || tile.y < 0 || tile.x >= cols || tile.y >= rows) {
              return;
            }
            const px = tile.x * TILE_SIZE;
            const py = tile.y * TILE_SIZE;

            ctx.fillStyle = ROAD_FILL;
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

            ctx.strokeStyle = ROAD_EDGE;
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 0.5, py + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
          });
        }

        function drawAttractions(cols, rows) {
          attractionTiles.forEach((key) => {
            const tile = parseTileKey(key);
            if (tile.x < 0 || tile.y < 0 || tile.x >= cols || tile.y >= rows) {
              return;
            }
            const px = tile.x * TILE_SIZE;
            const py = tile.y * TILE_SIZE;
            const cx = px + TILE_SIZE / 2;
            const cy = py + TILE_SIZE / 2;

            ctx.fillStyle = ATTRACTION_FILL;
            ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.33)";
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 4.5, py + 4.5, TILE_SIZE - 9, TILE_SIZE - 9);

            ctx.beginPath();
            ctx.fillStyle = ATTRACTION_MARK;
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        function drawHover() {
          if (!hoverTile) {
            return;
          }
          const px = hoverTile.x * TILE_SIZE;
          const py = hoverTile.y * TILE_SIZE;

          ctx.fillStyle = HOVER_FILL;
          ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

          ctx.strokeStyle = HOVER_EDGE;
          ctx.lineWidth = 2;
          ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        }

        function render() {
          const cols = Math.ceil(cssWidth / TILE_SIZE);
          const rows = Math.ceil(cssHeight / TILE_SIZE);

          drawGrassAndSpecks(cols, rows);
          drawRoads(cols, rows);
          drawAttractions(cols, rows);
          drawHover();
          updateHud();
        }

        function hasAdjacentRoad(tile) {
          const directions = [
            [1, 0],
            [-1, 0],
            [0, 1],
            [0, -1]
          ];

          for (let i = 0; i < directions.length; i += 1) {
            const d = directions[i];
            const key = tileKey(tile.x + d[0], tile.y + d[1]);
            if (roadTiles.has(key)) {
              return true;
            }
          }
          return false;
        }

        function applyRoadTool(tile) {
          const key = tileKey(tile.x, tile.y);
          if (roadTiles.has(key)) {
            roadTiles.delete(key);
            setMessage("道を削除しました");
            return;
          }

          roadTiles.add(key);
          setMessage("道を配置しました");
        }

        function applyAttractionTool(tile) {
          const key = tileKey(tile.x, tile.y);

          if (roadTiles.has(key)) {
            setMessage("道の上には施設を置けません");
            return;
          }

          if (attractionTiles.has(key)) {
            setMessage("その場所にはすでに施設があります");
            return;
          }

          if (!hasAdjacentRoad(tile)) {
            setMessage("道の隣に置いてください");
            return;
          }

          attractionTiles.add(key);
          setMessage("施設を配置しました");
        }

        function applyEraseTool(tile) {
          const key = tileKey(tile.x, tile.y);
          if (attractionTiles.has(key)) {
            attractionTiles.delete(key);
            setMessage("施設を削除しました");
            return;
          }

          if (roadTiles.has(key)) {
            roadTiles.delete(key);
            setMessage("道を削除しました");
            return;
          }

          setMessage("削除できる対象がありません");
        }

        function onPointerMove(event) {
          hoverTile = getPointerTile(event);
          render();
        }

        function onPointerLeave() {
          hoverTile = null;
          render();
        }

        function onClick(event) {
          const tile = getPointerTile(event);
          if (!tile) {
            return;
          }

          hoverTile = tile;
          if (currentTool === TOOL_ROAD) {
            applyRoadTool(tile);
          } else if (currentTool === TOOL_ATTRACTION) {
            applyAttractionTool(tile);
          } else {
            applyEraseTool(tile);
          }

          render();
        }

        function onKeyDown(event) {
          const key = event.key.toLowerCase();
          if (key === "r") {
            currentTool = TOOL_ROAD;
            setMessage("ツールを road に切り替えました");
          } else if (key === "a") {
            currentTool = TOOL_ATTRACTION;
            setMessage("ツールを attraction に切り替えました");
          } else if (key === "x") {
            currentTool = TOOL_ERASE;
            setMessage("ツールを erase に切り替えました");
          } else {
            return;
          }
          render();
        }

        window.addEventListener("resize", resizeCanvasAndRender);
        window.addEventListener("keydown", onKeyDown);
        canvas.addEventListener("mousemove", onPointerMove);
        canvas.addEventListener("mouseleave", onPointerLeave);
        canvas.addEventListener("click", onClick);

        resizeCanvasAndRender();
      })();
    </script>
  </body>
</html>
