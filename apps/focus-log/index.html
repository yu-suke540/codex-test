<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>集中タイマー付き作業ログ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1d2433;
      --muted: #5b6374;
      --accent: #3b82f6;
      --accent-dark: #1d4ed8;
      --border: #e0e4ec;
      --danger: #ef4444;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      max-width: 960px;
      margin: 0 auto 64px;
      padding: 0 20px 40px;
    }

    section {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 24px rgba(20, 36, 64, 0.08);
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .timer-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .timer-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .timer-meta {
      color: var(--muted);
      font-size: 14px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .ghost {
      background: #eef2ff;
      color: var(--accent-dark);
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input, textarea {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: #f8fafc;
    }

    .summary-card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .summary-card p {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .category-list {
      margin: 0;
      padding-left: 16px;
      color: var(--text);
    }

    .category-list li {
      margin-bottom: 6px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .muted {
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
    }

    .empty {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>集中タイマー付き作業ログ</h1>
    <p>集中タイムを記録し、今日の合計とカテゴリ別の時間を把握できます。</p>
  </header>
  <main>
    <section>
      <div class="timer-display">
        <div>
          <div class="timer-value" id="timerDisplay">00:00:00</div>
          <div class="timer-meta" id="timerStatus">待機中</div>
        </div>
        <div class="button-row">
          <button class="primary" id="startButton">開始</button>
          <button class="ghost" id="stopButton" disabled>停止</button>
          <button class="ghost" id="resetButton" disabled>リセット</button>
        </div>
      </div>
      <div class="form-grid">
        <label>
          作業カテゴリ（任意）
          <input type="text" id="categoryInput" placeholder="例: 企画、開発、学習" />
        </label>
        <label>
          メモ（任意）
          <textarea id="memoInput" placeholder="作業内容や気づきを記録"></textarea>
        </label>
      </div>
      <div class="button-row" style="margin-top: 16px;">
        <button class="primary" id="saveButton" disabled>ログを保存</button>
      </div>
    </section>

    <section>
      <div class="summary-grid">
        <div class="summary-card">
          <h3>今日の合計時間</h3>
          <p id="todayTotal">0 分</p>
        </div>
        <div class="summary-card">
          <h3>カテゴリ別合計（今日）</h3>
          <ul class="category-list" id="categoryTotals">
            <li class="muted">まだ記録がありません。</li>
          </ul>
        </div>
      </div>
    </section>

    <section>
      <div class="timer-display" style="margin-bottom: 12px;">
        <div>
          <h2 style="margin: 0; font-size: 20px;">作業ログ一覧</h2>
          <p class="muted" style="margin: 4px 0 0;">新しい順で表示します。</p>
        </div>
        <div class="actions">
          <button class="ghost" id="exportButton">CSVエクスポート</button>
          <button class="danger" id="clearAllButton">全件削除</button>
        </div>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>開始</th>
              <th>終了</th>
              <th>所要時間</th>
              <th>カテゴリ</th>
              <th>メモ</th>
              <th>記録日</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="logTable">
            <tr>
              <td colspan="7" class="empty">まだログがありません。</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <footer>データはブラウザのlocalStorageに保存されます。</footer>

  <script>
    const STORAGE_KEY = "focusLogEntries";

    const timerDisplay = document.getElementById("timerDisplay");
    const timerStatus = document.getElementById("timerStatus");
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const resetButton = document.getElementById("resetButton");
    const saveButton = document.getElementById("saveButton");
    const categoryInput = document.getElementById("categoryInput");
    const memoInput = document.getElementById("memoInput");
    const todayTotal = document.getElementById("todayTotal");
    const categoryTotals = document.getElementById("categoryTotals");
    const logTable = document.getElementById("logTable");
    const exportButton = document.getElementById("exportButton");
    const clearAllButton = document.getElementById("clearAllButton");

    let startTime = null;
    let stopTime = null;
    let timerInterval = null;

    const pad = (value) => String(value).padStart(2, "0");

    const formatClock = (ms) => {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
    };

    const formatDateTime = (date) => {
      const year = date.getFullYear();
      const month = pad(date.getMonth() + 1);
      const day = pad(date.getDate());
      const hours = pad(date.getHours());
      const minutes = pad(date.getMinutes());
      return `${year}-${month}-${day} ${hours}:${minutes}`;
    };

    const formatDate = (date) => {
      const year = date.getFullYear();
      const month = pad(date.getMonth() + 1);
      const day = pad(date.getDate());
      return `${year}-${month}-${day}`;
    };

    const getEntries = () => {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) return [];
      try {
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    };

    const saveEntries = (entries) => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    };

    const updateTimerDisplay = () => {
      if (!startTime) {
        timerDisplay.textContent = "00:00:00";
        return;
      }
      const now = stopTime ?? new Date();
      const elapsed = Math.max(0, now - startTime);
      timerDisplay.textContent = formatClock(elapsed);
    };

    const updateStatus = (message, color) => {
      timerStatus.textContent = message;
      timerStatus.style.color = color || "";
    };

    const startTimer = () => {
      startTime = new Date();
      stopTime = null;
      updateStatus(`開始: ${formatDateTime(startTime)}`, "var(--success)");
      startButton.disabled = true;
      stopButton.disabled = false;
      resetButton.disabled = true;
      saveButton.disabled = true;
      categoryInput.disabled = true;
      memoInput.disabled = true;
      timerInterval = setInterval(updateTimerDisplay, 1000);
      updateTimerDisplay();
    };

    const stopTimer = () => {
      stopTime = new Date();
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      updateTimerDisplay();
      updateStatus(`終了: ${formatDateTime(stopTime)}`, "var(--accent-dark)");
      startButton.disabled = true;
      stopButton.disabled = true;
      resetButton.disabled = false;
      saveButton.disabled = false;
      categoryInput.disabled = false;
      memoInput.disabled = false;
    };

    const resetTimer = () => {
      startTime = null;
      stopTime = null;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      updateTimerDisplay();
      updateStatus("待機中");
      startButton.disabled = false;
      stopButton.disabled = true;
      resetButton.disabled = true;
      saveButton.disabled = true;
      categoryInput.disabled = false;
      memoInput.disabled = false;
    };

    const calculateDurationMinutes = (start, end) => {
      const ms = Math.max(0, end - start);
      return Math.max(1, Math.ceil(ms / 60000));
    };

    const saveLog = () => {
      if (!startTime || !stopTime) return;
      const durationMinutes = calculateDurationMinutes(startTime, stopTime);
      const entry = {
        id: crypto.randomUUID(),
        start: startTime.toISOString(),
        end: stopTime.toISOString(),
        durationMinutes,
        category: categoryInput.value.trim(),
        memo: memoInput.value.trim(),
        recordedAt: new Date().toISOString(),
      };
      const entries = getEntries();
      entries.unshift(entry);
      saveEntries(entries);
      categoryInput.value = "";
      memoInput.value = "";
      resetTimer();
      renderAll();
    };

    const deleteEntry = (id) => {
      const entries = getEntries().filter((item) => item.id !== id);
      saveEntries(entries);
      renderAll();
    };

    const clearAll = () => {
      if (!confirm("本当に全てのログを削除しますか？")) return;
      saveEntries([]);
      renderAll();
    };

    const renderTable = (entries) => {
      logTable.innerHTML = "";
      if (!entries.length) {
        const row = document.createElement("tr");
        row.innerHTML = '<td colspan="7" class="empty">まだログがありません。</td>';
        logTable.appendChild(row);
        return;
      }
      entries.forEach((entry) => {
        const row = document.createElement("tr");
        const startDate = new Date(entry.start);
        const endDate = new Date(entry.end);
        row.innerHTML = `
          <td>${formatDateTime(startDate)}</td>
          <td>${formatDateTime(endDate)}</td>
          <td>${entry.durationMinutes} 分</td>
          <td>${entry.category ? `<span class="tag">${entry.category}</span>` : "-"}</td>
          <td>${entry.memo ? entry.memo.replace(/</g, "&lt;").replace(/>/g, "&gt;") : "-"}</td>
          <td>${formatDate(new Date(entry.recordedAt))}</td>
          <td><button class="danger" data-id="${entry.id}">削除</button></td>
        `;
        logTable.appendChild(row);
      });
      logTable.querySelectorAll("button[data-id]").forEach((button) => {
        button.addEventListener("click", () => deleteEntry(button.dataset.id));
      });
    };

    const renderSummary = (entries) => {
      const today = new Date();
      const todayKey = formatDate(today);
      const todayEntries = entries.filter((entry) => formatDate(new Date(entry.start)) === todayKey);
      const totalMinutes = todayEntries.reduce((sum, entry) => sum + entry.durationMinutes, 0);
      todayTotal.textContent = `${totalMinutes} 分`;

      const categoryMap = new Map();
      todayEntries.forEach((entry) => {
        const key = entry.category || "未分類";
        categoryMap.set(key, (categoryMap.get(key) || 0) + entry.durationMinutes);
      });

      categoryTotals.innerHTML = "";
      if (!categoryMap.size) {
        categoryTotals.innerHTML = '<li class="muted">まだ記録がありません。</li>';
        return;
      }

      Array.from(categoryMap.entries())
        .sort((a, b) => b[1] - a[1])
        .forEach(([category, minutes]) => {
          const li = document.createElement("li");
          li.textContent = `${category}: ${minutes} 分`;
          categoryTotals.appendChild(li);
        });
    };

    const renderAll = () => {
      const entries = getEntries();
      renderTable(entries);
      renderSummary(entries);
    };

    const exportCSV = () => {
      const entries = getEntries();
      if (!entries.length) {
        alert("エクスポートするログがありません。");
        return;
      }
      const headers = ["開始時刻", "終了時刻", "所要時間(分)", "カテゴリ", "メモ", "記録日時"];
      const rows = entries.map((entry) => [
        formatDateTime(new Date(entry.start)),
        formatDateTime(new Date(entry.end)),
        entry.durationMinutes,
        entry.category,
        entry.memo,
        formatDateTime(new Date(entry.recordedAt)),
      ]);
      const escapeValue = (value) => {
        const safe = value === null || value === undefined ? "" : String(value);
        return `"${safe.replace(/"/g, '""')}"`;
      };
      const csvContent = [headers, ...rows]
        .map((row) => row.map(escapeValue).join(","))
        .join("\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `focus-log-${formatDate(new Date())}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    };

    startButton.addEventListener("click", startTimer);
    stopButton.addEventListener("click", stopTimer);
    resetButton.addEventListener("click", resetTimer);
    saveButton.addEventListener("click", saveLog);
    exportButton.addEventListener("click", exportCSV);
    clearAllButton.addEventListener("click", clearAll);

    renderAll();
  </script>
</body>
</html>
